services:
  postgres:
    image: postgres:16

    container_name: tradeforge-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: tradeforge
      POSTGRES_PASSWORD: tradeforge
      POSTGRES_DB: tradeforge

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
